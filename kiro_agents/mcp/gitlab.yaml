name: gitlab

description: |
  Gitlab MCP server running inside a Docker container.

command: docker

args:
  - run
  - --rm
  - -p
  - "8091:8091"
  - -e
  - GITLAB_URL=${GITLAB_URL}
  - -e
  - GITLAB_TOKEN=${GITLAB_TOKEN}
  - -e
  - GITLAB_PROJECT_ID=${GITLAB_PROJECT_ID}
  - gitlab-mcp-server:latest

capabilities:
  - mr_read
  - mr_diff
  - mr_commits
  - mr_comments