name: filesystem

description: |
  Provides access to the local filesystem.
  Allows reading, writing, and modifying files in the project workspace.

command: npx

# WORKSPACE_ROOT reads from env. If not set, defaults to current directory.
args:
  - -y
  - "@modelcontextprotocol/server-filesystem"
  - "${WORKSPACE_ROOT:-.}"

capabilities:
  - file_read
  - file_write
  - file_list

timeout: 30000